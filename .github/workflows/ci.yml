name: CI

# Trigger on every push and pull request targeting main or develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    # Use a GitHub-hosted Ubuntu runner — no Docker needed, JDK is installed via setup-java
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          # Cache the local Maven repository to speed up subsequent runs
          cache: maven

      # gpsUtil, RewardCentral and TripPricer are not available on Maven Central.
      # They are distributed as local JARs (libs/) and must be installed
      # into the runner's local Maven repository before compilation.
      - name: Install local JAR dependencies
        run: |
          mvn install:install-file -Dfile=libs/gpsUtil.jar -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar
          mvn install:install-file -Dfile=libs/RewardCentral.jar -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar
          mvn install:install-file -Dfile=libs/TripPricer.jar -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar

      # Step 1 — fail fast if the code does not compile
      - name: Compile
        run: mvn compile

      # Step 2 — run functional tests only.
      # Performance tests (TestPerformance) are excluded because they run against
      # 100,000 users and would take several minutes, making the pipeline too slow
      # for rapid feedback. Run them locally with: mvn test -Dtest=TestPerformance
      - name: Test (excluding performance tests)
        run: mvn test -Dexclude=**/TestPerformance.java

      # Step 3 — produce the executable JAR artifact.
      # Tests are skipped here as they already ran in the previous step.
      - name: Build artifact
        run: mvn package -DskipTests

      # Store the JAR so it can be downloaded directly from the GitHub Actions run
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: tourguide
          path: target/*.jar
